name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          rm -rf package-lock.json node_modules
          npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: |
          if [ -d "android" ]; then
            npx cap sync android
          else
            npx cap add android
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          validate-wrappers: false

      - name: Build APK & AAB
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "Setting up keystore..."
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is empty or not set!"
            exit 1
          fi
          
          # Decode base64 robustly using Python to prevent any shell/encoding issues
          python3 -c "
import os, base64
keystore_b64 = os.environ.get('KEYSTORE_BASE64', '')
if not keystore_b64.strip():
    print('Error: KEYSTORE_BASE64 env var is empty!')
    exit(1)
try:
    decoded = base64.b64decode(keystore_b64.strip())
    os.makedirs('app', exist_ok=True)
    with open('app/release.keystore', 'wb') as f:
        f.write(decoded)
    print('Keystore successfully decoded and written to app/release.keystore')
except Exception as e:
    print('Failed to decode KEYSTORE_BASE64:', e)
    exit(1)
"
          
          # Copy to root directory just in case Gradle resolves relatively from root project
          cp app/release.keystore release.keystore
          
          echo "Verifying keystore creation..."
          ls -lh app/release.keystore
          
          # Append signing configuration to gradle.properties for 100% robust and secure injection.
          # This avoids any bash shell-escaping issues with passwords containing special characters (like $, !, etc.)
          echo "Writing signing configuration to gradle.properties..."
          echo "" >> gradle.properties
          echo "android.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.keystore" >> gradle.properties
          echo "android.injected.signing.store.password=$STORE_PASSWORD" >> gradle.properties
          echo "android.injected.signing.key.alias=$KEY_ALIAS" >> gradle.properties
          echo "android.injected.signing.key.password=$KEY_PASSWORD" >> gradle.properties
          
          echo "Building release APK & AAB..."
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
          ./gradlew assembleRelease bundleRelease

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
