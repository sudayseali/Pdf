name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          rm -rf package-lock.json node_modules
          npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: |
          if [ -d "android" ]; then
            npx cap sync android
          else
            npx cap add android
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          validate-wrappers: false

      - name: Build APK & AAB
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "Setting up keystore..."
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is empty or not set!"
            exit 1
          fi
          
          # Decode base64 robustly using Python to prevent any shell/encoding/padding issues
          python3 -c "
import os, base64
keystore_b64 = os.environ.get('KEYSTORE_BASE64', '')
if not keystore_b64.strip():
    print('Error: KEYSTORE_BASE64 env var is empty!')
    exit(1)
# Remove all whitespace, newlines, and carriage returns
keystore_b64 = ''.join(keystore_b64.split())
# Fix padding if it is missing
padding_needed = len(keystore_b64) % 4
if padding_needed:
    keystore_b64 += '=' * (4 - padding_needed)
print(f'Base64 string length: {len(keystore_b64)}')
try:
    decoded = base64.b64decode(keystore_b64)
    print(f'Decoded size: {len(decoded)} bytes')
    if len(decoded) < 100:
        print('Warning: Decoded keystore is extremely small, it might be corrupt or incorrect!')
    os.makedirs('app', exist_ok=True)
    with open('app/release.keystore', 'wb') as f:
        f.write(decoded)
    print('Keystore successfully decoded and written to app/release.keystore')
except Exception as e:
    print('Failed to decode KEYSTORE_BASE64:', e)
    exit(1)
"
          
          # Copy to root directory just in case Gradle resolves relatively from root project
          cp app/release.keystore release.keystore
          
          echo "Verifying keystore creation..."
          ls -lh app/release.keystore
          
          echo "Checking environment variables (presence only, no values shown to keep them secure):"
          if [ -n "$STORE_PASSWORD" ]; then echo "  STORE_PASSWORD is set (length: ${#STORE_PASSWORD})"; else echo "  STORE_PASSWORD is empty"; fi
          if [ -n "$KEY_ALIAS" ]; then echo "  KEY_ALIAS is set (length: ${#KEY_ALIAS})"; else echo "  KEY_ALIAS is empty"; fi
          if [ -n "$KEY_PASSWORD" ]; then echo "  KEY_PASSWORD is set (length: ${#KEY_PASSWORD})"; else echo "  KEY_PASSWORD is empty"; fi
          
          echo "Building release APK & AAB..."
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
          # Clean build and compile
          ./gradlew clean assembleRelease bundleRelease

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
