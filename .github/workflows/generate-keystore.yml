name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key Alias'
        required: true
        default: 'release-key'
      validity_days:
        description: 'Key Validity in Days'
        required: true
        default: '10000'
      developer_name:
        description: 'Your Full Name (Common Name CN)'
        required: true
        default: 'App Developer'
      organization:
        description: 'Your Organization (O)'
        required: true
        default: 'SilentPDF Studio'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Random Passwords and Keystore
        run: |
          # 1. Generate strong random passwords
          STORE_PASS=$(openssl rand -hex 12)
          KEY_PASS=$(openssl rand -hex 12)
          KEY_ALIAS="${{ github.event.inputs.key_alias }}"
          VALIDITY="${{ github.event.inputs.validity_days }}"
          CN="${{ github.event.inputs.developer_name }}"
          ORG="${{ github.event.inputs.organization }}"

          echo "=================================================================="
          echo "         ANDROID KEYSTORE GENERATION SUCCESSFUL                   "
          echo "=================================================================="
          echo ""
          echo "Please copy the following values and save them as GitHub Secrets"
          echo "in your repository: Settings -> Secrets and variables -> Actions"
          echo ""
          echo "------------------------------------------------------------------"
          echo "1. KEY_ALIAS:"
          echo "$KEY_ALIAS"
          echo "------------------------------------------------------------------"
          echo "2. STORE_PASSWORD:"
          echo "$STORE_PASS"
          echo "------------------------------------------------------------------"
          echo "3. KEY_PASSWORD:"
          echo "$KEY_PASS"
          echo "------------------------------------------------------------------"
          echo ""

          # 2. Run Java Keytool to generate the Keystore file
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity "$VALIDITY" \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=$CN, O=$ORG, C=US"

          # 3. Base64 encode the keystore file
          KEYSTORE_BASE64=$(base64 -w 0 release.keystore)

          echo "------------------------------------------------------------------"
          echo "4. KEYSTORE_BASE64 (Copy the entire line below - it is very long):"
          echo "$KEYSTORE_BASE64"
          echo "------------------------------------------------------------------"
          echo ""
          echo "=================================================================="
          echo "How to add these to GitHub Secrets:"
          echo "  - KEYSTORE_BASE64 -> Add the long string above"
          echo "  - KEY_ALIAS -> $KEY_ALIAS"
          echo "  - KEY_PASSWORD -> $KEY_PASS"
          echo "  - STORE_PASSWORD -> $STORE_PASS"
          echo "=================================================================="
